openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: MyCarQR API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: qr
    description: QR branding settings
  - name: vehicles
    description: Vehicle management
  - name: alerts
    description: Scan alerts
  - name: documents
    description: Vehicle document reminders
  - name: public
    description: Public scan page (no auth)
  - name: users
    description: User profile and subscription
  - name: admin
    description: Admin panel operations
  - name: billing
    description: Google Play Billing operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /qr-settings:
    get:
      operationId: getQrSettings
      tags: [qr]
      summary: Get QR branding settings (public)
      responses:
        "200":
          description: Current QR settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QrSettings"

  /admin/qr-settings:
    put:
      operationId: updateQrSettings
      tags: [qr, admin]
      summary: Update QR branding settings (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQrSettingsBody"
      responses:
        "200":
          description: Updated QR settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QrSettings"
        "403":
          description: Forbidden

  /vehicles:
    get:
      operationId: getVehicles
      tags: [vehicles]
      summary: List user's vehicles
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of vehicles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vehicle"
    post:
      operationId: createVehicle
      tags: [vehicles]
      summary: Add a new vehicle
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVehicleBody"
      responses:
        "201":
          description: Vehicle created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"

  /vehicles/{vehicleId}:
    get:
      operationId: getVehicle
      tags: [vehicles]
      summary: Get a vehicle by ID
      security:
        - bearerAuth: []
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
    put:
      operationId: updateVehicle
      tags: [vehicles]
      summary: Update a vehicle
      security:
        - bearerAuth: []
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVehicleBody"
      responses:
        "200":
          description: Updated vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
    delete:
      operationId: deleteVehicle
      tags: [vehicles]
      summary: Delete a vehicle
      security:
        - bearerAuth: []
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /vehicles/{vehicleId}/toggle-qr:
    post:
      operationId: toggleVehicleQr
      tags: [vehicles]
      summary: Enable or disable QR code for a vehicle
      security:
        - bearerAuth: []
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                active:
                  type: boolean
              required: [active]
      responses:
        "200":
          description: Updated vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"

  /alerts:
    get:
      operationId: getAlerts
      tags: [alerts]
      summary: List user's scan alerts
      security:
        - bearerAuth: []
      parameters:
        - name: vehicleId
          in: query
          schema:
            type: integer
        - name: unreadOnly
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScanAlert"

  /alerts/{alertId}/read:
    post:
      operationId: markAlertRead
      tags: [alerts]
      summary: Mark alert as read
      security:
        - bearerAuth: []
      parameters:
        - name: alertId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanAlert"

  /alerts/mark-all-read:
    post:
      operationId: markAllAlertsRead
      tags: [alerts]
      summary: Mark all alerts as read
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
                required: [updated]

  /documents:
    get:
      operationId: getDocuments
      tags: [documents]
      summary: List vehicle documents/reminders
      security:
        - bearerAuth: []
      parameters:
        - name: vehicleId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VehicleDocument"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Add a document reminder
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentBody"
      responses:
        "201":
          description: Created document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehicleDocument"

  /documents/{documentId}:
    put:
      operationId: updateDocument
      tags: [documents]
      summary: Update a document reminder
      security:
        - bearerAuth: []
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentBody"
      responses:
        "200":
          description: Updated document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehicleDocument"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document reminder
      security:
        - bearerAuth: []
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /public/vehicle/{qrCode}:
    get:
      operationId: getPublicVehicle
      tags: [public]
      summary: Get public vehicle info by QR code (no auth)
      parameters:
        - name: qrCode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public vehicle info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicVehicleInfo"
        "404":
          description: Not found or QR disabled

  /public/vehicle/{qrCode}/sos:
    get:
      operationId: getPublicSos
      tags: [public]
      summary: Get SOS emergency profile for a vehicle's owner (no auth)
      parameters:
        - name: qrCode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SOS profile info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicSosInfo"
        "404":
          description: Not found or SOS disabled

  /public/vehicle/{qrCode}/accident:
    post:
      operationId: submitAccidentReport
      tags: [public]
      summary: Submit an accident witness report (no auth)
      parameters:
        - name: qrCode
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitAccidentBody"
      responses:
        "201":
          description: Report submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccidentReport"

  /public/vehicle/{qrCode}/lost-item:
    post:
      operationId: submitLostItem
      tags: [public]
      summary: Submit a lost item/key found report (no auth)
      parameters:
        - name: qrCode
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitLostItemBody"
      responses:
        "201":
          description: Report submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LostItem"

  /public/vehicle/{qrCode}/alert:
    post:
      operationId: sendPublicAlert
      tags: [public]
      summary: Send a scan alert to the vehicle owner (no auth)
      parameters:
        - name: qrCode
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendAlertBody"
      responses:
        "201":
          description: Alert sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanAlert"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [public]
      summary: Request a presigned URL for direct-to-bucket photo upload (no auth)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"

  /sos-profile:
    get:
      operationId: getSosProfile
      tags: [users]
      summary: Get own SOS emergency profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: SOS profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SosProfile"
    put:
      operationId: upsertSosProfile
      tags: [users]
      summary: Create or update own SOS emergency profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertSosProfileBody"
      responses:
        "200":
          description: Saved SOS profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SosProfile"

  /accident-reports:
    get:
      operationId: getAccidentReports
      tags: [alerts]
      summary: List accident reports for user's vehicles
      security:
        - bearerAuth: []
      parameters:
        - name: vehicleId
          in: query
          schema:
            type: integer
        - name: unreadOnly
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of accident reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccidentReport"

  /accident-reports/{reportId}/read:
    post:
      operationId: markAccidentReportRead
      tags: [alerts]
      summary: Mark accident report as read
      security:
        - bearerAuth: []
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccidentReport"

  /lost-items:
    get:
      operationId: getLostItems
      tags: [alerts]
      summary: List lost item reports for user's vehicles
      security:
        - bearerAuth: []
      parameters:
        - name: vehicleId
          in: query
          schema:
            type: integer
        - name: unreadOnly
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of lost item reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LostItem"

  /lost-items/{itemId}/read:
    post:
      operationId: markLostItemRead
      tags: [alerts]
      summary: Mark lost item report as read
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LostItem"

  /verify-purchase:
    post:
      operationId: verifyPurchase
      tags: [billing]
      summary: Verify a Google Play purchase and activate premium
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyPurchaseBody"
      responses:
        "200":
          description: Purchase verified and premium activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyPurchaseResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Purchase verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payment-settings:
    get:
      operationId: getPaymentSettings
      tags: [payments]
      summary: Get current payment settings (UPI ID, QR, prices)
      responses:
        "200":
          description: Payment settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentSettings"

  /payment-requests:
    get:
      operationId: getMyPaymentRequests
      tags: [payments]
      summary: Get own payment requests
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of payment requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentRequest"
    post:
      operationId: submitPaymentRequest
      tags: [payments]
      summary: Submit a new payment request with screenshot
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitPaymentBody"
      responses:
        "201":
          description: Payment request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentRequest"

  /admin/payment-settings:
    put:
      operationId: updatePaymentSettings
      tags: [admin]
      summary: Admin — update payment settings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePaymentSettingsBody"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentSettings"

  /admin/payment-requests:
    get:
      operationId: getAdminPaymentRequests
      tags: [admin]
      summary: Admin — list all payment requests
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: All payment requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentRequest"

  /admin/payment-requests/{requestId}/approve:
    post:
      operationId: approvePaymentRequest
      tags: [admin]
      summary: Admin — approve payment, grant premium
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                adminNote:
                  type: string
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentRequest"

  /admin/payment-requests/{requestId}/reject:
    post:
      operationId: rejectPaymentRequest
      tags: [admin]
      summary: Admin — reject payment request
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                adminNote:
                  type: string
              required:
                - adminNote
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentRequest"

  /admin/vehicles:
    get:
      operationId: getAdminVehicles
      tags: [admin]
      summary: Admin — list all vehicles
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Vehicle list
          content:
            application/json:
              schema:
                type: object
                properties:
                  vehicles:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminVehicle"
                  total:
                    type: integer
                required:
                  - vehicles
                  - total

  /admin/sos-profiles:
    get:
      operationId: getAdminSosProfiles
      tags: [admin]
      summary: Admin — list all SOS profiles
      security:
        - bearerAuth: []
      responses:
        "200":
          description: SOS profiles list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SosProfile"

  /me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile & subscription
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      operationId: updateMyProfile
      tags: [users]
      summary: Update current user profile (display name, phone)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /me/push-token:
    post:
      operationId: registerPushToken
      tags: [users]
      summary: Register an FCM push token for the current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPushTokenBody"
      responses:
        "200":
          description: Token registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
    delete:
      operationId: deletePushToken
      tags: [users]
      summary: Remove an FCM push token for the current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeletePushTokenBody"
      responses:
        "200":
          description: Token removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /check-document-expiry:
    post:
      operationId: checkDocumentExpiry
      tags: [documents]
      summary: Check for expiring documents and send push notifications
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Expiry check completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpiryCheckResult"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [users]
      summary: Get dashboard summary stats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Admin overall stats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/users:
    get:
      operationId: getAdminUsers
      tags: [admin]
      summary: List all users (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUsersList"

  /admin/users/{userId}/upgrade:
    post:
      operationId: adminUpgradeUser
      tags: [admin]
      summary: Upgrade user to premium (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                plan:
                  type: string
                  enum: [free, premium]
                durationDays:
                  type: integer
              required: [plan]
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/alerts:
    get:
      operationId: getAdminAlerts
      tags: [admin]
      summary: List all scan alerts (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Alerts list
          content:
            application/json:
              schema:
                type: object
                properties:
                  alerts:
                    type: array
                    items:
                      $ref: "#/components/schemas/ScanAlert"
                  total:
                    type: integer
                required: [alerts, total]

  /admin/accident-reports:
    get:
      operationId: getAdminAccidentReports
      tags: [admin]
      summary: List all accident reports (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Accident reports list
          content:
            application/json:
              schema:
                type: object
                properties:
                  reports:
                    type: array
                    items:
                      $ref: "#/components/schemas/AccidentReport"
                  total:
                    type: integer
                required: [reports, total]

  /admin/accident-reports/{reportId}/read:
    post:
      operationId: markAdminAccidentReportRead
      tags: [admin]
      summary: Mark accident report as handled (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccidentReport"

  /admin/lost-items:
    get:
      operationId: getAdminLostItems
      tags: [admin]
      summary: List all lost item reports (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Lost items list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/LostItem"
                  total:
                    type: integer
                required: [items, total]

  /admin/lost-items/{itemId}/read:
    post:
      operationId: markAdminLostItemRead
      tags: [admin]
      summary: Mark lost item report as handled (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LostItem"

  /sticker-orders:
    post:
      operationId: createStickerOrder
      tags: [stickerOrders]
      summary: Place a physical sticker order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStickerOrderRequest"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StickerOrder"
    get:
      operationId: getMyStickerOrders
      tags: [stickerOrders]
      summary: Get my sticker orders
      security:
        - bearerAuth: []
      responses:
        "200":
          description: My orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items:
                      $ref: "#/components/schemas/StickerOrder"
                required: [orders]

  /admin/sticker-orders:
    get:
      operationId: getAdminStickerOrders
      tags: [admin]
      summary: Get all sticker orders (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: paymentStatus
          in: query
          schema:
            type: string
        - name: orderStatus
          in: query
          schema:
            type: string
      responses:
        "200":
          description: All orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items:
                      $ref: "#/components/schemas/StickerOrder"
                  total:
                    type: integer
                required: [orders, total]

  /admin/sticker-orders/{orderId}:
    put:
      operationId: updateStickerOrder
      tags: [admin]
      summary: Update sticker order status/tracking (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStickerOrderRequest"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StickerOrder"

